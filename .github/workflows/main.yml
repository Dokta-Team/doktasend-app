name: DoktaSend App Docker CI/CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dokta-team/doktasend-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        id: build
        run: |
          VERSION_TAG=${GITHUB_SHA}
          
          echo "🔨 Building version: $VERSION_TAG"
          
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:$VERSION_TAG /
                       -t ghcr.io/${{ env.IMAGE_NAME }}:latest .
          
          docker push ghcr.io/${{ env.IMAGE_NAME }}:$VERSION_TAG
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
          
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_OUTPUT

    outputs:
      VERSION_TAG: ${{ steps.build.outputs.VERSION_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS using Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            
            cd apps/frontend/doktasend-app
            
            git pull origin main
            
            VERSION_TAG="${{ needs.build-and-push.outputs.VERSION_TAG }}"
            
            echo "🚀 Deploying version: $VERSION_TAG"
            
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:$VERSION_TAG
            
            export VERSION_TAG=$VERSION_TAG
            
            docker compose down doktasend-app-frontend || true
            docker compose up -d doktasend-app-frontend
            
            echo "⏳ Waiting for container to be ready..."
            timeout 60s bash -c 'until docker compose ps doktasend-app-frontend | grep -q "Up"; do sleep 2; done'
            
            echo "✅ Deployment complete!"
            docker compose ps doktasend-app-frontend
            
            echo "🧹 Cleaning up old images..."
            docker images ghcr.io/${{ env.IMAGE_NAME }} --format "{{.Tag}}" | \
              sort -r | tail -n +4 | xargs -r docker rmi -f || true
            
            echo "💾 Disk usage:"
            docker system df
          EOF

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            echo "🔍 Verifying frontend is running..."
            sleep 5
            curl -f http://localhost:3110 || exit 1
            echo "✅ Frontend is responding!"
          EOF